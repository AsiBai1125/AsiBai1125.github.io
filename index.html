<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>数字素养测试</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      touch-action: pan-y;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    /* 手机框完全填满父容器 */
    .phone-frame {
      width: 100%;
      height: 100%;
      background: #000;
      position: relative;
      overflow: hidden;
    }
    /* 视频容器 */
    .video-container {
      position: relative;
      width: 100%;
      height: 100%;
    }
    .video-card {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #111;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      will-change: transform;
    }
    .video-content {
      width: 100%; height: 70%;
      background-size: cover;
      background-position: center;
      position: relative;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    .video-info {
      position: absolute;
      bottom: 15px; left: 15px; right: 15px;
      background: rgba(0,0,0,0.6);
      padding: 8px 12px;
      border-radius: 10px;
      backdrop-filter: blur(8px);
      color: white;
    }
    .video-title {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 3px;
    }
    .video-desc {
      font-size: 12px;
      opacity: 0.9;
    }

    /* 右侧按钮区 */
    .action-buttons {
      position: absolute;
      right: 8px;
      bottom: 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      z-index: 10;
    }
    .action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      background: none; border: none;
      color: white; font-size: 11px;
      cursor: pointer;
      transition: transform 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .action-btn:active { transform: scale(0.9); }
    .action-btn .icon {
      width: 38px; height: 38px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      backdrop-filter: blur(4px);
    }

    /* 爱心特效 */
    .heart-burst {
      position: absolute;
      pointer-events: none;
      animation: burst 0.6s ease-out forwards;
      font-size: 32px;
      color: #ff2d55;
      z-index: 20;
    }
    @keyframes burst {
      0% { transform: scale(0) translateY(0); opacity: 1; }
      100% { transform: scale(1.3) translateY(-50px); opacity: 0; }
    }

    /* 评论输入条 */
    .comment-bar {
      position: absolute;
      bottom: 70px;
      left: 12px; right: 12px;
      background: rgba(0,0,0,0.85);
      border-radius: 25px;
      padding: 6px 12px;
      display: none;
      align-items: center;
      gap: 6px;
      z-index: 30;
      backdrop-filter: blur(10px);
    }
    .comment-bar input {
      flex: 1;
      background: transparent;
      border: none;
      color: white;
      font-size: 13px;
      outline: none;
    }
    .comment-bar button {
      background: #007aff;
      border: none;
      color: white;
      padding: 4px 14px;
      border-radius: 15px;
      font-size: 12px;
    }
    .comment-bar .close-comment {
      background: #555;
      margin-right: 2px;
    }
    /* 弹幕效果 */
    .danmaku {
      position: absolute;
      top: 25%;
      right: -100%;
      white-space: nowrap;
      font-size: 16px;
      font-weight: bold;
      color: #fff;
      text-shadow: 1px 1px 2px black;
      animation: danmakuMove 2s linear forwards;
      z-index: 25;
      pointer-events: none;
    }
    @keyframes danmakuMove {
      0% { right: -100%; }
      100% { right: 110%; }
    }

    /* 举报弹窗 */
    .report-popup {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.9);
      padding: 15px;
      border-radius: 15px 15px 0 0;
      z-index: 30;
      transform: translateY(100%);
      transition: transform 0.3s ease;
      backdrop-filter: blur(10px);
    }
    .report-popup.show { transform: translateY(0); }
    .report-option {
      background: #1c1c1e;
      padding: 10px;
      margin-bottom: 6px;
      border-radius: 10px;
      color: white;
      text-align: center;
      font-size: 14px;
      cursor: pointer;
    }
    .report-option:active { background: #333; }
    .btn-cancel {
      background: #555;
      color: white;
      padding: 8px;
      border: none;
      border-radius: 15px;
      width: 100%;
      margin-top: 6px;
      font-size: 13px;
    }

    /* 引导蒙层 */
    .intro-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      z-index: 50;
      text-align: center;
      padding: 15px;
    }
    .intro-overlay h2 { font-size: 20px; }
    .intro-overlay p { font-size: 14px; margin-top: 8px; }
    .intro-overlay button {
      margin-top: 20px;
      padding: 10px 24px;
      background: #007aff;
      color: white;
      border: none;
      border-radius: 25px;
      font-size: 16px;
    }

    /* 结果页 */
    .result-page {
      display: none;
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #0a0a1a;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      z-index: 40;
      padding: 15px;
      text-align: center;
    }
    .result-page.show { display: flex; }
    .result-title { font-size: 20px; margin-bottom: 15px; opacity: 0.8; }
    .result-identity {
      font-size: 38px;
      font-weight: bold;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .result-buttons { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
    .result-buttons button {
      padding: 10px 24px;
      border-radius: 25px;
      border: none;
      font-size: 14px;
      cursor: pointer;
      background: #007aff;
      color: white;
    }
    .btn-outline {
      background: transparent;
      border: 2px solid #007aff;
      color: #007aff;
    }
  </style>
</head>
<body>
  <div class="phone-frame" id="phoneFrame">
    <!-- 引导蒙层 -->
    <div class="intro-overlay" id="introOverlay">
      <h2>你是一个普通用户</h2>
      <p>接下来的选择，将决定你成为什么样的人</p>
      <button id="startBtn">开始测试</button>
    </div>

    <!-- 视频容器 -->
    <div class="video-container" id="videoContainer"></div>

    <!-- 右侧按钮 -->
    <div class="action-buttons" id="actionButtons">
      <div class="action-btn" id="likeBtn">
        <div class="icon">❤️</div><span>点赞</span>
      </div>
      <div class="action-btn" id="commentBtn">
        <div class="icon">💬</div><span>评论</span>
      </div>
      <div class="action-btn" id="reportBtn">
        <div class="icon">🚩</div><span>举报</span>
      </div>
      <div class="action-btn" id="dislikeBtn">
        <div class="icon">➖</div><span>不感兴趣</span>
      </div>
    </div>

    <!-- 评论输入条 -->
    <div class="comment-bar" id="commentBar">
      <button class="close-comment" id="closeComment">✕</button>
      <input type="text" placeholder="说点什么..." id="commentInput">
      <button id="sendComment">发送</button>
    </div>

    <!-- 举报弹窗 -->
    <div class="report-popup" id="reportPopup">
      <div class="report-option" data-reason="虚假信息">虚假信息</div>
      <div class="report-option" data-reason="骚扰">骚扰/网暴</div>
      <div class="report-option" data-reason="有害内容">有害内容</div>
      <div class="report-option" data-reason="隐私侵犯">隐私侵犯</div>
      <button class="btn-cancel" id="cancelReport">取消</button>
    </div>

    <!-- 结果页 -->
    <div class="result-page" id="resultPage">
      <div class="result-title">你的身份是</div>
      <div class="result-identity" id="resultIdentity"></div>
      <p id="resultDesc" style="max-width:90%; line-height:1.5; font-size:14px;"></p>
      <div class="result-buttons">
        <button id="restartBtn">再测一次</button>
        <button id="continueBtn" class="btn-outline">继续</button>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const videos = [
        { id:1, title:"震惊！这种食物致癌，千万别吃", desc:"模糊的检测报告截图，大量转发", bgColor:"#4a2c2a", icon:"🛑" },
        { id:2, title:"某网红被曝出轨，评论区已沦陷", desc:"数百条辱骂评论，网络暴力进行中", bgColor:"#2a2a4a", icon:"💢" },
        { id:3, title:"救救这个孩子！急需医疗费", desc:"一张病床照片，真假难辨的求助", bgColor:"#2a4a2a", icon:"🏥" },
        { id:4, title:"AI生成的“历史照片”走红", desc:"极为逼真但完全虚构的历史画面", bgColor:"#3a3a2a", icon:"🤖" },
        { id:5, title:"这款产品三天瘦十斤！", desc:"夸张的带货视频，评论区全是好评", bgColor:"#4a3a2a", icon:"🛒" },
        { id:6, title:"暖心！陌生人雨中送伞", desc:"但未提及事件后续，信息不完整", bgColor:"#2a3a4a", icon:"☔" },
        { id:7, title:"曝光！某公司内部聊天记录流出", desc:"包含个人隐私，被疯狂转发", bgColor:"#3a2a3a", icon:"🔒" },
        { id:8, title:"科学家解释：为什么谣言容易传播", desc:"理性科普，呼吁核实信息", bgColor:"#1a2a3a", icon:"🔬" }
      ];
      const scoreMap = [
        { like:{ration:-1,empathy:0,spread:2}, comment:{ration:0,empathy:0,spread:1}, report:{ration:2,empathy:0,spread:0} },
        { like:{ration:0,empathy:-1,spread:1}, comment:{ration:0,empathy:0,spread:1}, report:{ration:2,empathy:1,spread:0} },
        { like:{ration:0,empathy:2,spread:1}, comment:{ration:0,empathy:1,spread:1}, report:{ration:1,empathy:0,spread:0} },
        { like:{ration:-1,empathy:0,spread:2}, comment:{ration:0,empathy:0,spread:1}, report:{ration:2,empathy:0,spread:0} },
        { like:{ration:0,empathy:-1,spread:1}, comment:{ration:0,empathy:0,spread:1}, report:{ration:2,empathy:0,spread:0} },
        { like:{ration:0,empathy:2,spread:1}, comment:{ration:0,empathy:1,spread:1}, report:{ration:1,empathy:0,spread:0} },
        { like:{ration:0,empathy:0,spread:2}, comment:{ration:0,empathy:0,spread:2}, report:{ration:2,empathy:1,spread:0} },
        { like:{ration:1,empathy:1,spread:1}, comment:{ration:1,empathy:1,spread:0}, report:{ration:1,empathy:0,spread:0} }
      ];

      let currentIndex = 0;
      let ration = 0, empathy = 0, spread = 0;
      let likeCount = 0, reportCount = 0, skipCount = 0;
      let interactionLog = [];
      let isTransitioning = false;

      const phoneFrame = document.getElementById('phoneFrame');
      const videoContainer = document.getElementById('videoContainer');
      const introOverlay = document.getElementById('introOverlay');
      const likeBtn = document.getElementById('likeBtn');
      const commentBtn = document.getElementById('commentBtn');
      const reportBtn = document.getElementById('reportBtn');
      const dislikeBtn = document.getElementById('dislikeBtn');
      const commentBar = document.getElementById('commentBar');
      const commentInput = document.getElementById('commentInput');
      const sendCommentBtn = document.getElementById('sendComment');
      const closeComment = document.getElementById('closeComment');
      const reportPopup = document.getElementById('reportPopup');
      const resultPage = document.getElementById('resultPage');
      const resultIdentity = document.getElementById('resultIdentity');
      const resultDesc = document.getElementById('resultDesc');

      function createVideoCards() {
        videoContainer.innerHTML = '';
        videos.forEach((v, i) => {
          const card = document.createElement('div');
          card.className = 'video-card';
          card.style.transform = `translateY(${i * 100}%)`;
          card.innerHTML = `
            <div class="video-content" style="background: linear-gradient(135deg, ${v.bgColor}, #000);">
              <div style="font-size:60px; opacity:0.3; position:absolute; top:30%;">${v.icon}</div>
              <div class="video-info">
                <div class="video-title">${v.title}</div>
                <div class="video-desc">${v.desc}</div>
              </div>
            </div>
          `;
          videoContainer.appendChild(card);
        });
      }

      function slideTo(index) {
        if (isTransitioning) return;
        isTransitioning = true;
        currentIndex = index;
        document.querySelectorAll('.video-card').forEach((card, i) => {
          card.style.transform = `translateY(${(i - index) * 100}%)`;
        });
        setTimeout(() => { isTransitioning = false; }, 300);
      }

      function nextVideo() {
        if (currentIndex < videos.length - 1) {
          slideTo(currentIndex + 1);
        } else {
          showResult();
        }
      }

      function recordAction(type) {
        interactionLog.push({ videoIndex: currentIndex, action: type });
        const map = scoreMap[currentIndex];
        if (map && map[type]) {
          ration += map[type].ration || 0;
          empathy += map[type].empathy || 0;
          spread += map[type].spread || 0;
        }
        if (type === 'like') likeCount++;
        if (type === 'report') reportCount++;
        if (type === 'skip') skipCount++;
      }

      function showResult() {
        let identity, desc;
        if (skipCount >= 8) {
          identity = '冷漠旁观者'; desc = '你对一切内容都选择忽略，不愿参与任何互动。';
        } else if (likeCount >= 5 && reportCount === 0) {
          identity = '流量推手'; desc = '你热衷于点赞和传播，却很少质疑。';
        } else if (reportCount >= 3 && ration >= 7) {
          identity = '数字公民'; desc = '你敢于举报虚假信息，理性传播正能量。';
        } else if (empathy >= 6 && ration <= 2) {
          identity = '圣母心泛滥'; desc = '你充满同情心，却容易被煽情内容利用。';
        } else {
          identity = '普通人'; desc = '你的行为中规中矩，还有提升数字素养的空间。';
        }
        resultIdentity.textContent = identity;
        resultDesc.textContent = desc;
        resultPage.classList.add('show');
        document.getElementById('actionButtons').style.display = 'none';
      }

      function resetGame() {
        currentIndex = 0; ration = 0; empathy = 0; spread = 0;
        likeCount = 0; reportCount = 0; skipCount = 0;
        interactionLog = [];
        resultPage.classList.remove('show');
        document.getElementById('actionButtons').style.display = 'flex';
        slideTo(0);
      }

      function createHeart(x, y) {
        const heart = document.createElement('div');
        heart.className = 'heart-burst';
        heart.textContent = '❤️';
        heart.style.left = x + 'px';
        heart.style.top = y + 'px';
        videoContainer.appendChild(heart);
        heart.addEventListener('animationend', () => heart.remove());
      }

      function showDanmaku(text) {
        const danmaku = document.createElement('div');
        danmaku.className = 'danmaku';
        danmaku.textContent = text;
        videoContainer.appendChild(danmaku);
        danmaku.addEventListener('animationend', () => danmaku.remove());
      }

      // 事件绑定
      document.getElementById('startBtn').addEventListener('click', () => {
        introOverlay.style.opacity = '0';
        setTimeout(() => introOverlay.style.display = 'none', 500);
      });

      likeBtn.addEventListener('click', (e) => {
        if (isTransitioning || resultPage.classList.contains('show')) return;
        const rect = likeBtn.querySelector('.icon').getBoundingClientRect();
        const phoneRect = phoneFrame.getBoundingClientRect();
        createHeart(rect.left + rect.width/2 - phoneRect.left, rect.top - phoneRect.top);
        recordAction('like');
        nextVideo();
      });

      commentBtn.addEventListener('click', () => {
        if (isTransitioning || resultPage.classList.contains('show')) return;
        commentBar.style.display = 'flex';
        commentInput.focus();
      });

      sendCommentBtn.addEventListener('click', () => {
        const text = commentInput.value.trim();
        if (text) {
          recordAction('comment');
          showDanmaku(text);
        }
        commentBar.style.display = 'none';
        commentInput.value = '';
        nextVideo();
      });

      closeComment.addEventListener('click', () => {
        commentBar.style.display = 'none';
        commentInput.value = '';
        nextVideo();
      });

      reportBtn.addEventListener('click', () => {
        if (isTransitioning || resultPage.classList.contains('show')) return;
        reportPopup.classList.add('show');
      });

      document.querySelectorAll('.report-option').forEach(opt => {
        opt.addEventListener('click', () => {
          reportPopup.classList.remove('show');
          recordAction('report');
          nextVideo();
        });
      });

      document.getElementById('cancelReport').addEventListener('click', () => {
        reportPopup.classList.remove('show');
      });

      dislikeBtn.addEventListener('click', () => {
        if (isTransitioning || resultPage.classList.contains('show')) return;
        recordAction('skip');
        nextVideo();
      });

      // 滑动
      let touchStartY = 0;
      phoneFrame.addEventListener('touchstart', (e) => {
        if (resultPage.classList.contains('show')) return;
        touchStartY = e.touches[0].clientY;
      }, { passive: true });
      phoneFrame.addEventListener('touchend', (e) => {
        if (resultPage.classList.contains('show') || isTransitioning) return;
        const deltaY = e.changedTouches[0].clientY - touchStartY;
        if (deltaY < -40 && currentIndex < videos.length - 1) {
          recordAction('skip');
          nextVideo();
        }
      });
      phoneFrame.addEventListener('wheel', (e) => {
        if (resultPage.classList.contains('show') || isTransitioning) return;
        if (e.deltaY > 20 && currentIndex < videos.length - 1) {
          recordAction('skip');
          nextVideo();
          e.preventDefault();
        }
      }, { passive: false });

      // 结果页按钮
      restartBtn.addEventListener('click', resetGame);
      continueBtn.addEventListener('click', () => {
        window.parent.postMessage({ action: 'nextPage', result: resultIdentity.textContent }, '*');
      });

      // 初始化
      createVideoCards();
      slideTo(0);
    })();
  </script>
</body>
</html>
